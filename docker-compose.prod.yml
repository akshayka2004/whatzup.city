# ============================================================
# Docker Compose — Production Multi-Tenant Architecture
# ============================================================

services:
  # ── PostgreSQL Database ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-saas_platform}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - database-network
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-saas_platform}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1024M

  # ── Redis Cache & Queue Broker ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - cache-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Typesense Search ────────────────────────────────────────
  typesense:
    image: typesense/typesense:27.1
    container_name: saas-typesense-prod
    restart: always
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_prod_data:/data
    networks:
      - search-network
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--tries=1', 'http://localhost:8108/health']
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── NestJS REST & WebSocket API Gateway ─────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: saas-api-prod
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - database-network
      - cache-network
      - search-network
      - gateway-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # ── Background BullMQ Worker Service ────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: saas-worker-prod
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - database-network
      - cache-network
      - search-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # ── Next.js Public Web Application ──────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_NAME: web
    container_name: saas-web-prod
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
      PORT: 3000
    depends_on:
      - api
    networks:
      - gateway-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.8'
          memory: 512M

  # ── Next.js Admin/Merchant Dashboard ────────────────────────
  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_NAME: admin
    container_name: saas-admin-prod
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
      PORT: 3000
    depends_on:
      - api
    networks:
      - gateway-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.8'
          memory: 512M

  # ── Nginx Entrypoint / Reverse Proxy ────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: saas-nginx-prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
      - admin
    networks:
      - gateway-network

networks:
  database-network:
    driver: bridge
  cache-network:
    driver: bridge
  search-network:
    driver: bridge
  gateway-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  typesense_prod_data:
