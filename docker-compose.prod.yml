# ============================================================
# Docker Compose — Production Multi-Tenant Architecture
# ============================================================

services:
  # ── Redis Cache & Queue Broker ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - cache-network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── Typesense Search ────────────────────────────────────────
  typesense:
    image: typesense/typesense:27.1
    container_name: saas-typesense-prod
    restart: always
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_prod_data:/data
    networks:
      - search-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── NestJS REST & WebSocket API Gateway ─────────────────────
  api:
    image: ${DOCKER_REGISTRY:-yourdockerhub}/saas-api:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PORT: 4000
    depends_on:
      redis:
        condition: service_healthy
      typesense:
        condition: service_started
    networks:
      - cache-network
      - search-network
      - gateway-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # ── Background BullMQ Worker Service ────────────────────────
  worker:
    image: ${DOCKER_REGISTRY:-yourdockerhub}/saas-worker:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      typesense:
        condition: service_started
    networks:
      - cache-network
      - search-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # ── Next.js Public Web Application ──────────────────────────
  web:
    image: ${DOCKER_REGISTRY:-yourdockerhub}/saas-web:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_NAME: web
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
      PORT: 3000
    depends_on:
      - api
    networks:
      - gateway-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.8'
          memory: 512M

  # ── Next.js Admin/Merchant Dashboard ────────────────────────
  admin:
    image: ${DOCKER_REGISTRY:-yourdockerhub}/saas-admin:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_NAME: admin
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}
      PORT: 3000
    depends_on:
      - api
    networks:
      - gateway-network
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.8'
          memory: 512M

  # ── Nginx Entrypoint / Reverse Proxy ────────────────────────
  nginx:
    image: ${DOCKER_REGISTRY:-yourdockerhub}/saas-nginx:latest
    build:
      context: .
      dockerfile: docker/Dockerfile.nginx
    container_name: saas-nginx-prod
    restart: always
    ports:
      - '80:80'
      - '443:443'
    environment:
      - DOMAIN=${DOMAIN}
      - NGINX_ENVSUBST_FILTER=DOMAIN
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
      - admin
    networks:
      - gateway-network

networks:
  cache-network:
    driver: bridge
  search-network:
    driver: bridge
  gateway-network:
    driver: bridge

volumes:
  redis_prod_data:
  typesense_prod_data:
