# ============================================================
# Docker Compose — Local Production-Equivalent Environment
# ============================================================

services:
  # ── Redis Cache & Queue Broker ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: saas-redis-local
    restart: unless-stopped
    ports:
      - '6379:6379'
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis} --appendonly yes
    volumes:
      - redis_local_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Typesense Search ────────────────────────────────────────
  typesense:
    image: typesense/typesense:27.1
    container_name: saas-typesense-local
    restart: unless-stopped
    ports:
      - '8108:8108'
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-dev-typesense-key}
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_local_data:/data

  # ── NestJS REST & WebSocket API Gateway ─────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: saas-api-local
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis}
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-dev-typesense-key}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      PORT: 4000
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${NEXT_PUBLIC_SUPABASE_BUCKET:-saas-uploads}
    depends_on:
      redis:
        condition: service_healthy
      typesense:
        condition: service_started

  # ── Background Worker Service ──────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: saas-worker-local
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      TYPESENSE_HOST: typesense
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-dev-typesense-key}
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_STORAGE_BUCKET: ${NEXT_PUBLIC_SUPABASE_BUCKET:-saas-uploads}
    depends_on:
      redis:
        condition: service_healthy

  # ── Next.js Public Web Application ──────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        APP_NAME: web
        NEXT_PUBLIC_API_URL: http://localhost:4000
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_SUPABASE_BUCKET: ${NEXT_PUBLIC_SUPABASE_BUCKET:-saas-uploads}
    container_name: saas-web-local
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000
      PORT: 3000
    depends_on:
      - api


volumes:
  redis_local_data:
  typesense_local_data:
