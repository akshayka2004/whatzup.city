# ============================================================
# GitHub Actions CI/CD Pipeline
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: akshayka2004/v0-saas-platform-foundation

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @saas/database db:generate

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GHCR (GitHub Container Registry)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Push API Image
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Worker Image
      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/worker:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Web Client Image
      - name: Build and push Web Client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          build-args: |
            APP_NAME=web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/web:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build & Push Admin Dashboard Image
      - name: Build and push Admin Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          build-args: |
            APP_NAME=admin
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/admin:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/admin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Deploy to Staging VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/saas-platform-staging
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Production VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/saas-platform-production
            # Pull latest containers
            docker compose -f docker-compose.prod.yml pull
            # Run migrations on active schema partition
            docker compose -f docker-compose.prod.yml run --rm api pnpm --filter @saas/database db:migrate:prod
            # Zero-downtime rolling reload for NestJS and Next.js frontends
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale api=2 --scale worker=2 --scale web=2 --scale admin=2 --no-recreate
            # Gracefully restart proxy routes
            docker compose -f docker-compose.prod.yml exec -T nginx nginx -s reload
            # Prune old untagged container builds
            docker image prune -f
