# ============================================================
# Prometheus Monitoring System Configuration
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── API Gateway Scraper ─────────────────────────────────────
  - job_name: 'nestjs-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['api:4000']

  # ── Redis Server Metrics ────────────────────────────────────
  # (Assumes redis_exporter container is run alongside Redis)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── PostgreSQL Metrics ──────────────────────────────────────
  # (Assumes postgres_exporter container is run alongside Postgres)
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
